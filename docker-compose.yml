services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lorekeeper/app
    container_name: app
    restart: unless-stopped
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - app-network
  
  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: webserver
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network
    
  # MySQL Service
  db:
    image: mysql:8.4
    container_name: db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: lorekeeperdb
      MYSQL_ROOT_PASSWORD: supHardPassw364or_sqlmy
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - app-network
  
  # Node.js Service
  node:
    image: node:24-alpine
    container_name: node
    volumes:
      - .:/var/www
    working_dir: /var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - app-network

# Docker Networks
networks:
  app-network:
    driver: bridge

# Volumes
volumes:
  dbdata:
    driver: local